<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Perfil | Founders Teokaye</title>
  <meta name="description" content="Perfil de founder en la comunidad Teokaye">
  <link rel="icon" type="image/svg+xml" href="/simbolo.svg">
  <link rel="apple-touch-icon" href="/founders/icon-180.png">
  <meta name="theme-color" content="#461D14">
  <meta property="og:type" content="profile">
  <meta property="og:site_name" content="Founders Teokaye">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#E6E0D6;
      --text:#1E1B18;
      --accent:#B8826B;
      --accent-dark:#461D14;
      --white:#FFFCF8;
      --gray:#F0EDE8;
      --terra:rgba(184,130,107,0.15);
    }
    html{font-size:16px;}
    body{
      font-family:'Source Sans 3',sans-serif;
      background:linear-gradient(180deg, var(--accent-dark) 0%, var(--accent-dark) 200px, var(--bg) 200px);
      color:var(--text);
      min-height:100vh;
      min-height:100dvh;
    }

    .profile-container{
      max-width:420px;
      margin:0 auto;
      padding:2rem 1.25rem 3rem;
    }

    /* Header Section */
    .profile-header{
      text-align:center;
      padding-top:1rem;
      margin-bottom:1.5rem;
    }

    .avatar{
      width:100px;
      height:100px;
      background:var(--white);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 1rem;
      font-family:'Cormorant Infant',serif;
      font-size:2.5rem;
      font-weight:600;
      color:var(--accent-dark);
      box-shadow:0 4px 20px rgba(0,0,0,0.15);
      overflow:hidden;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .name{
      font-family:'Cormorant Infant',serif;
      font-size:1.75rem;
      font-weight:600;
      color:var(--white);
      margin-bottom:0.25rem;
    }

    .location{
      font-size:0.95rem;
      color:rgba(255,255,255,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0.35rem;
    }

    .location svg{
      width:14px;
      height:14px;
      stroke:currentColor;
      stroke-width:2;
      fill:none;
    }

    .bio{
      margin-top:0.75rem;
      font-size:0.95rem;
      color:rgba(255,255,255,0.85);
      line-height:1.5;
    }

    /* Social Icons */
    .social-icons{
      display:flex;
      justify-content:center;
      gap:0.75rem;
      margin-top:1.25rem;
    }

    .social-icon{
      width:42px;
      height:42px;
      background:rgba(255,255,255,0.15);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--white);
      text-decoration:none;
      transition:all 0.2s ease;
    }

    .social-icon:hover{
      background:var(--white);
      color:var(--accent-dark);
      transform:scale(1.1);
    }

    .social-icon svg{
      width:20px;
      height:20px;
      fill:currentColor;
    }

    /* Main Content */
    .profile-content{
      background:var(--white);
      border-radius:24px;
      padding:1.5rem;
      box-shadow:0 4px 24px rgba(70,29,20,0.1);
    }

    /* Contact Buttons */
    .contact-section{
      margin-bottom:1.5rem;
    }

    .contact-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0.6rem;
      width:100%;
      padding:0.9rem 1rem;
      font-family:'Source Sans 3',sans-serif;
      font-size:1rem;
      font-weight:600;
      border:none;
      border-radius:12px;
      cursor:pointer;
      text-decoration:none;
      transition:all 0.2s ease;
      margin-bottom:0.6rem;
    }

    .contact-btn svg{
      width:20px;
      height:20px;
      stroke:currentColor;
      stroke-width:2;
      fill:none;
    }

    .contact-btn.whatsapp{
      background:#25D366;
      color:white;
    }
    .contact-btn.whatsapp:hover{
      background:#20BD5A;
      transform:translateY(-2px);
    }
    .contact-btn.whatsapp svg{
      fill:currentColor;
      stroke:none;
    }

    .contact-btn.vcard{
      background:var(--accent-dark);
      color:var(--white);
    }
    .contact-btn.vcard:hover{
      background:var(--accent);
      transform:translateY(-2px);
    }

    .contact-btn.share{
      background:var(--gray);
      color:var(--text);
    }
    .contact-btn.share:hover{
      background:var(--terra);
    }

    /* Phone Display */
    .phone-display{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0.5rem;
      padding:0.75rem;
      background:var(--gray);
      border-radius:10px;
      margin-bottom:0.6rem;
      font-size:1.05rem;
      font-weight:500;
      color:var(--accent-dark);
    }

    .phone-display svg{
      width:18px;
      height:18px;
      stroke:var(--accent);
      stroke-width:2;
      fill:none;
    }

    /* Permission Required */
    .permission-required{
      text-align:center;
      padding:1rem;
      background:var(--gray);
      border-radius:12px;
      margin-bottom:0.6rem;
    }

    .permission-required p{
      font-size:0.9rem;
      color:rgba(30,27,24,0.6);
      margin-bottom:0.75rem;
    }

    .btn-request{
      padding:0.75rem 1.5rem;
      font-family:'Source Sans 3',sans-serif;
      font-size:0.95rem;
      font-weight:600;
      background:var(--accent-dark);
      color:var(--white);
      border:none;
      border-radius:10px;
      cursor:pointer;
      transition:all 0.2s ease;
    }

    .btn-request:hover{
      background:var(--accent);
    }

    /* Section Title */
    .section-title{
      font-size:0.7rem;
      font-weight:600;
      letter-spacing:0.1em;
      color:rgba(30,27,24,0.5);
      text-transform:uppercase;
      margin:1.5rem 0 0.75rem;
      padding-top:1rem;
      border-top:1px solid var(--gray);
    }

    .section-title:first-child{
      margin-top:0;
      padding-top:0;
      border-top:none;
    }

    /* Project Cards */
    .project-card{
      background:var(--gray);
      border-radius:14px;
      padding:1rem 1.25rem;
      margin-bottom:0.6rem;
      transition:all 0.2s ease;
    }

    .project-card:hover{
      transform:translateY(-2px);
      box-shadow:0 4px 12px rgba(70,29,20,0.08);
    }

    .project-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .project-name{
      font-size:1.05rem;
      font-weight:600;
      color:var(--accent-dark);
    }

    .project-badge{
      font-size:0.7rem;
      font-weight:600;
      padding:0.25rem 0.6rem;
      border-radius:6px;
      text-transform:uppercase;
      letter-spacing:0.03em;
    }

    .project-badge.idea{background:var(--gray);color:rgba(30,27,24,0.6);border:1px solid rgba(30,27,24,0.15);}
    .project-badge.construccion{background:var(--terra);color:var(--accent-dark);}
    .project-badge.ingresos{background:rgba(139,160,130,0.25);color:#4A5D44;}
    .project-badge.escalando{background:var(--accent-dark);color:var(--white);}

    .project-desc{
      font-size:0.9rem;
      color:rgba(30,27,24,0.7);
      line-height:1.5;
      margin-top:0.5rem;
    }

    .project-link{
      display:inline-flex;
      align-items:center;
      gap:0.35rem;
      margin-top:0.6rem;
      font-size:0.85rem;
      font-weight:500;
      color:var(--accent);
      text-decoration:none;
    }

    .project-link:hover{
      text-decoration:underline;
    }

    .project-link svg{
      width:14px;
      height:14px;
      stroke:currentColor;
      stroke-width:2;
      fill:none;
    }

    /* QR Section */
    .qr-section{
      text-align:center;
      padding:1rem 0;
    }

    .qr-container{
      background:var(--white);
      padding:1rem;
      border-radius:12px;
      border:2px dashed var(--gray);
      display:inline-block;
    }

    .qr-hint{
      font-size:0.8rem;
      color:rgba(30,27,24,0.5);
      margin-top:0.75rem;
    }

    /* Branding */
    .branding{
      text-align:center;
      margin-top:2rem;
      padding-top:1.5rem;
      border-top:1px solid var(--gray);
    }

    .branding a{
      font-family:'Cormorant Infant',serif;
      font-size:0.9rem;
      font-weight:500;
      color:var(--accent);
      text-decoration:none;
    }

    .branding span{
      margin:0 0.25rem;
      color:var(--accent-dark);
    }

    /* Loading & Error */
    .loading{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:60vh;
    }

    .spinner{
      width:40px;
      height:40px;
      border:3px solid var(--gray);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg);}}

    .error{
      text-align:center;
      padding:4rem 2rem;
      color:var(--white);
    }

    .error h2{
      font-family:'Cormorant Infant',serif;
      font-size:1.5rem;
      margin-bottom:0.5rem;
    }

    /* Toast */
    .toast{
      position:fixed;
      bottom:2rem;
      left:50%;
      transform:translateX(-50%) translateY(100px);
      background:var(--accent-dark);
      color:var(--white);
      padding:0.875rem 1.5rem;
      border-radius:10px;
      font-weight:500;
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
      opacity:0;
      transition:all 0.3s ease;
      z-index:1000;
    }

    .toast.visible{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .toast.success{background:#4A5D44;}
  </style>
</head>
<body>
  <div class="profile-container">
    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <!-- Error -->
    <div class="error" id="error" style="display:none;">
      <h2>Perfil no encontrado</h2>
      <p>Este perfil no existe o no esta disponible.</p>
    </div>

    <!-- Profile -->
    <div id="profile" style="display:none;">
      <!-- Header -->
      <div class="profile-header">
        <div class="avatar" id="avatar">A</div>
        <h1 class="name" id="name">Nombre</h1>
        <p class="location" id="location">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          <span>Ciudad</span>
        </p>
        <p class="bio" id="bio"></p>

        <!-- Social Icons -->
        <div class="social-icons" id="socialIcons"></div>
      </div>

      <!-- Main Content Card -->
      <div class="profile-content">
        <!-- Contact Section -->
        <div class="contact-section" id="contactSection">
          <!-- Dynamic content based on permissions -->
        </div>

        <!-- Projects -->
        <div id="projectsSection">
          <h3 class="section-title">Proyectos</h3>
          <div id="projectsList"></div>
        </div>

        <!-- QR Code -->
        <div class="qr-section">
          <h3 class="section-title">Comparte este perfil</h3>
          <div class="qr-container">
            <div id="qrCode"></div>
          </div>
          <p class="qr-hint">Escanea para ver este perfil</p>
        </div>

        <!-- Branding -->
        <div class="branding">
          <a href="https://teokaye.mx">Teokaye<span>x</span>Founders</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/founders/js/founders-config.js"></script>
  <script src="/founders/js/founders-qr.js"></script>
  <script src="/founders/js/founders-vcard.js"></script>

  <script>
    let founder = null;
    let projects = [];

    const etapaLabels = {
      'idea': 'Idea',
      'construccion': 'Construyendo',
      'ingresos': 'Con ingresos',
      'escalando': 'Escalando'
    };

    // Social icons SVG
    const socialSVG = {
      instagram: '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>',
      twitter: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
      tiktok: '<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>',
      linkedin: '<svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="9" width="4" height="12" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="4" cy="4" r="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
      website: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" fill="none" stroke="currentColor" stroke-width="2"/></svg>'
    };

    // Init
    document.addEventListener('DOMContentLoaded', loadProfile);

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('s');
      const id = params.get('id');

      if (!slug && !id) {
        showError();
        return;
      }

      try {
        founder = slug
          ? await FoundersConfig.getFounderBySlug(slug)
          : await FoundersConfig.getFounderById(id);

        if (!founder) {
          showError();
          return;
        }

        projects = await FoundersConfig.getFounderProjects(founder.id);

        // Fallback to legacy project
        if (projects.length === 0 && founder.proyecto) {
          projects = [{
            nombre: founder.proyecto,
            descripcion: founder.descripcion_proyecto,
            etapa: founder.etapa,
            url: founder.website
          }];
        }

        render();
      } catch (err) {
        console.error('Error:', err);
        showError();
      }
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }

    function render() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('profile').style.display = 'block';

      // Update meta
      document.title = `${founder.nombre} | Founders Teokaye`;

      // Avatar
      const avatarEl = document.getElementById('avatar');
      if (founder.foto_url) {
        avatarEl.innerHTML = `<img src="${founder.foto_url}" alt="${founder.nombre}">`;
      } else {
        avatarEl.textContent = founder.nombre.charAt(0).toUpperCase();
      }

      // Name & Location
      document.getElementById('name').textContent = founder.nombre;
      document.getElementById('location').querySelector('span').textContent = founder.ciudad || 'Mexico';

      // Bio
      const bioEl = document.getElementById('bio');
      if (founder.bio) {
        bioEl.textContent = founder.bio;
        bioEl.style.display = 'block';
      } else {
        bioEl.style.display = 'none';
      }

      // Social Icons
      renderSocialIcons();

      // Contact Section
      renderContactSection();

      // Projects
      renderProjects();

      // QR
      FoundersQR.generateProfileQR('qrCode', founder, { size: 160 });
    }

    function renderSocialIcons() {
      const container = document.getElementById('socialIcons');
      const links = [];

      if (founder.instagram) {
        const url = founder.instagram.startsWith('http') ? founder.instagram : `https://instagram.com/${founder.instagram.replace('@', '')}`;
        links.push(`<a href="${url}" class="social-icon" target="_blank" rel="noopener" title="Instagram">${socialSVG.instagram}</a>`);
      }
      if (founder.twitter) {
        const url = founder.twitter.startsWith('http') ? founder.twitter : `https://x.com/${founder.twitter.replace('@', '')}`;
        links.push(`<a href="${url}" class="social-icon" target="_blank" rel="noopener" title="X/Twitter">${socialSVG.twitter}</a>`);
      }
      if (founder.tiktok) {
        const url = founder.tiktok.startsWith('http') ? founder.tiktok : `https://tiktok.com/@${founder.tiktok.replace('@', '')}`;
        links.push(`<a href="${url}" class="social-icon" target="_blank" rel="noopener" title="TikTok">${socialSVG.tiktok}</a>`);
      }
      if (founder.linkedin) {
        const url = founder.linkedin.startsWith('http') ? founder.linkedin : `https://linkedin.com/in/${founder.linkedin}`;
        links.push(`<a href="${url}" class="social-icon" target="_blank" rel="noopener" title="LinkedIn">${socialSVG.linkedin}</a>`);
      }
      if (founder.website) {
        const url = founder.website.startsWith('http') ? founder.website : `https://${founder.website}`;
        links.push(`<a href="${url}" class="social-icon" target="_blank" rel="noopener" title="Website">${socialSVG.website}</a>`);
      }

      container.innerHTML = links.join('');
    }

    function renderContactSection() {
      const container = document.getElementById('contactSection');
      let html = '';

      // Check if requires permission
      if (founder.requiere_permiso && !founder.telefono_publico) {
        html = `
          <div class="permission-required">
            <p>${founder.nombre.split(' ')[0]} requiere tu solicitud para compartir su contacto</p>
            <button class="btn-request" onclick="requestContact()">Solicitar contacto</button>
          </div>
        `;
      } else {
        // Phone display (if public)
        if (founder.telefono_publico && founder.telefono) {
          html += `
            <div class="phone-display">
              <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
              ${FoundersConfig.formatPhone(founder.telefono)}
            </div>
          `;
        }

        // WhatsApp button (if phone is public)
        if (founder.telefono_publico && founder.telefono) {
          const waUrl = `https://wa.me/${FoundersConfig.formatPhoneWhatsApp(founder.telefono)}`;
          html += `
            <a href="${waUrl}" class="contact-btn whatsapp" target="_blank">
              <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Enviar WhatsApp
            </a>
          `;
        }

        // vCard button
        html += `
          <button class="contact-btn vcard" onclick="downloadContact()">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
            Agregar a contactos
          </button>
        `;
      }

      // Share button always visible
      html += `
        <button class="contact-btn share" onclick="shareProfile()">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
          Compartir perfil
        </button>
      `;

      container.innerHTML = html;
    }

    function renderProjects() {
      const container = document.getElementById('projectsList');

      if (projects.length === 0) {
        document.getElementById('projectsSection').style.display = 'none';
        return;
      }

      container.innerHTML = projects.map(p => `
        <div class="project-card">
          <div class="project-header">
            <span class="project-name">${p.nombre}</span>
            ${p.etapa ? `<span class="project-badge ${p.etapa}">${etapaLabels[p.etapa] || p.etapa}</span>` : ''}
          </div>
          ${p.descripcion ? `<p class="project-desc">${p.descripcion}</p>` : ''}
          ${p.url ? `<a href="${p.url.startsWith('http') ? p.url : 'https://' + p.url}" class="project-link" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            ${p.url.replace(/^https?:\/\//, '').replace(/\/$/, '')}
          </a>` : ''}
        </div>
      `).join('');
    }

    function downloadContact() {
      FoundersVCard.download(founder, projects);
      showToast('Contacto descargado');
    }

    async function shareProfile() {
      const url = window.location.href;
      const title = `${founder.nombre} | Founders Teokaye`;

      if (navigator.share) {
        try {
          await navigator.share({ title, url });
        } catch (e) {
          copyToClipboard(url);
        }
      } else {
        copyToClipboard(url);
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Link copiado');
      });
    }

    function requestContact() {
      // For now, just show a message. Push notifications would require more setup.
      showToast('Solicitud enviada');
      // TODO: Implement push notification system
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible', 'success');
      setTimeout(() => toast.classList.remove('visible', 'success'), 3000);
    }
  </script>
</body>
</html>
