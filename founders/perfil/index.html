<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Perfil | Founders Teokaye</title>
  <meta name="description" content="Perfil de founder en la comunidad Teokaye">
  <link rel="icon" type="image/svg+xml" href="/simbolo.svg">
  <link rel="apple-touch-icon" href="/founders/icon-180.png">
  <meta name="theme-color" content="#461D14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#FFFCF8;
      --text:#1E1B18;
      --accent:#B8826B;
      --accent-dark:#461D14;
      --gray:#F0EDE8;
      --gray-dark:#E6E0D6;
      --terra:rgba(184,130,107,0.15);
    }
    html{font-size:16px;}
    body{
      font-family:'Source Sans 3',sans-serif;
      background:var(--gray-dark);
      color:var(--text);
      min-height:100vh;
      min-height:100dvh;
    }

    /* Top Navigation */
    .top-nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      background:var(--bg);
      border-bottom:1px solid var(--gray);
      padding:0.75rem 1rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:100;
    }

    .nav-link{
      display:flex;
      align-items:center;
      gap:0.4rem;
      font-size:0.9rem;
      font-weight:500;
      color:var(--accent-dark);
      text-decoration:none;
      padding:0.5rem 0.75rem;
      border-radius:8px;
      transition:all 0.2s;
    }

    .nav-link:hover{
      background:var(--terra);
    }

    .nav-link svg{
      width:18px;
      height:18px;
      stroke:currentColor;
      stroke-width:2;
      fill:none;
    }

    .nav-brand{
      font-family:'Cormorant Infant',serif;
      font-size:0.95rem;
      font-weight:600;
      color:var(--accent);
    }

    /* Main Container */
    .profile-container{
      max-width:480px;
      margin:0 auto;
      padding:4.5rem 1rem 2rem;
    }

    /* Profile Card */
    .profile-card{
      background:var(--bg);
      border-radius:20px;
      box-shadow:0 2px 20px rgba(70,29,20,0.08);
      overflow:hidden;
    }

    /* Header */
    .profile-header{
      background:linear-gradient(135deg, var(--accent-dark) 0%, #5D2A1F 100%);
      padding:2rem 1.5rem;
      text-align:center;
    }

    .avatar{
      width:90px;
      height:90px;
      background:var(--bg);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 1rem;
      font-family:'Cormorant Infant',serif;
      font-size:2.25rem;
      font-weight:600;
      color:var(--accent-dark);
      border:3px solid rgba(255,255,255,0.2);
      overflow:hidden;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .name{
      font-family:'Cormorant Infant',serif;
      font-size:1.6rem;
      font-weight:600;
      color:#fff;
      margin-bottom:0.25rem;
    }

    .location{
      font-size:0.9rem;
      color:rgba(255,255,255,0.75);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0.3rem;
    }

    .location svg{
      width:14px;
      height:14px;
      stroke:currentColor;
      stroke-width:2;
      fill:none;
    }

    .bio{
      margin-top:0.75rem;
      font-size:0.9rem;
      color:rgba(255,255,255,0.85);
      line-height:1.5;
    }

    /* Body */
    .profile-body{
      padding:1.5rem;
    }

    /* Social Links Grid */
    .social-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(100px, 1fr));
      gap:0.6rem;
      margin-bottom:1.25rem;
    }

    .social-link{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0.35rem;
      padding:0.875rem 0.5rem;
      background:var(--gray);
      border-radius:12px;
      text-decoration:none;
      color:var(--text);
      transition:all 0.2s;
    }

    .social-link:hover{
      background:var(--terra);
      transform:translateY(-2px);
    }

    .social-link svg{
      width:24px;
      height:24px;
    }

    .social-link span{
      font-size:0.75rem;
      font-weight:500;
    }

    /* Colors for social icons */
    .social-link.instagram svg{fill:#E4405F;}
    .social-link.facebook svg{fill:#1877F2;}
    .social-link.twitter svg{fill:#000;}
    .social-link.tiktok svg{fill:#000;}
    .social-link.linkedin svg{fill:#0A66C2;}
    .social-link.youtube svg{fill:#FF0000;}
    .social-link.website svg{stroke:var(--accent-dark);fill:none;}

    /* Request button in social grid */
    .social-grid .btn{
      padding:1rem;
      font-size:0.9rem;
    }

    /* Contact Buttons */
    .contact-buttons{
      display:flex;
      flex-direction:column;
      gap:0.6rem;
      margin-bottom:1.5rem;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0.5rem;
      padding:0.875rem 1rem;
      font-family:'Source Sans 3',sans-serif;
      font-size:0.95rem;
      font-weight:600;
      border:none;
      border-radius:12px;
      cursor:pointer;
      text-decoration:none;
      transition:all 0.2s;
    }

    .btn svg{
      width:20px;
      height:20px;
    }

    .btn-whatsapp{
      background:#25D366;
      color:#fff;
    }
    .btn-whatsapp:hover{background:#20BD5A;}
    .btn-whatsapp svg{fill:#fff;}

    .btn-primary{
      background:var(--accent-dark);
      color:#fff;
    }
    .btn-primary:hover{background:var(--accent);}
    .btn-primary svg{stroke:#fff;stroke-width:2;fill:none;}

    .btn-secondary{
      background:var(--gray);
      color:var(--text);
    }
    .btn-secondary:hover{background:var(--gray-dark);}
    .btn-secondary svg{stroke:var(--text);stroke-width:2;fill:none;}

    /* Phone display */
    .phone-display{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0.5rem;
      padding:0.75rem;
      background:var(--gray);
      border-radius:10px;
      margin-bottom:0.6rem;
      font-size:1rem;
      font-weight:600;
      color:var(--accent-dark);
    }

    .phone-display svg{
      width:18px;
      height:18px;
      stroke:var(--accent);
      stroke-width:2;
      fill:none;
    }

    /* Section */
    .section{
      margin-bottom:1.5rem;
    }

    .section-title{
      font-size:0.7rem;
      font-weight:700;
      letter-spacing:0.1em;
      color:rgba(30,27,24,0.5);
      text-transform:uppercase;
      margin-bottom:0.75rem;
    }

    /* Project Card */
    .project-card{
      background:var(--gray);
      border-radius:12px;
      padding:1rem;
      margin-bottom:0.6rem;
    }

    .project-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:0.75rem;
    }

    .project-name{
      font-size:1rem;
      font-weight:600;
      color:var(--accent-dark);
    }

    .project-badge{
      flex-shrink:0;
      font-size:0.65rem;
      font-weight:700;
      padding:0.25rem 0.5rem;
      border-radius:4px;
      text-transform:uppercase;
      letter-spacing:0.03em;
    }

    .project-badge.idea{background:#e0e0e0;color:#666;}
    .project-badge.construccion{background:var(--terra);color:var(--accent-dark);}
    .project-badge.ingresos{background:rgba(76,175,80,0.2);color:#2E7D32;}
    .project-badge.escalando{background:var(--accent-dark);color:#fff;}

    .project-desc{
      font-size:0.875rem;
      color:rgba(30,27,24,0.7);
      line-height:1.5;
      margin-top:0.5rem;
    }

    .project-link{
      display:inline-flex;
      align-items:center;
      gap:0.3rem;
      margin-top:0.5rem;
      font-size:0.8rem;
      font-weight:500;
      color:var(--accent);
      text-decoration:none;
    }

    .project-link:hover{text-decoration:underline;}

    .project-link svg{
      width:14px;
      height:14px;
      stroke:currentColor;
      stroke-width:2;
      fill:none;
    }

    /* QR Section */
    .qr-section{
      text-align:center;
      padding:1rem 0;
    }

    .qr-container{
      display:inline-block;
      padding:0.75rem;
      background:#fff;
      border-radius:12px;
      border:1px solid var(--gray);
    }

    .qr-hint{
      font-size:0.75rem;
      color:rgba(30,27,24,0.5);
      margin-top:0.5rem;
    }

    /* Branding */
    .branding{
      text-align:center;
      padding-top:1rem;
      border-top:1px solid var(--gray);
    }

    .branding a{
      font-family:'Cormorant Infant',serif;
      font-size:0.85rem;
      font-weight:500;
      color:var(--accent);
      text-decoration:none;
    }

    /* Loading & Error */
    .loading{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:50vh;
    }

    .spinner{
      width:36px;
      height:36px;
      border:3px solid var(--gray);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg);}}

    .error{
      text-align:center;
      padding:3rem 1.5rem;
    }

    .error h2{
      font-family:'Cormorant Infant',serif;
      font-size:1.4rem;
      margin-bottom:0.5rem;
    }

    .error p{color:rgba(30,27,24,0.6);}

    /* Toast */
    .toast{
      position:fixed;
      bottom:1.5rem;
      left:50%;
      transform:translateX(-50%) translateY(100px);
      background:var(--accent-dark);
      color:#fff;
      padding:0.75rem 1.25rem;
      border-radius:10px;
      font-size:0.9rem;
      font-weight:500;
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
      opacity:0;
      transition:all 0.3s;
      z-index:1000;
    }

    .toast.visible{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <a href="/founders/directorio/" class="nav-link">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Directorio
    </a>
    <span class="nav-brand">Founders</span>
    <a href="/founders/app/" class="nav-link">
      Mi Perfil
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </nav>

  <div class="profile-container">
    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <!-- Error -->
    <div class="error" id="error" style="display:none;">
      <h2>Perfil no encontrado</h2>
      <p>Este perfil no existe o no esta disponible.</p>
    </div>

    <!-- Profile -->
    <div id="profile" style="display:none;">
      <div class="profile-card">
        <!-- Header -->
        <div class="profile-header">
          <div class="avatar" id="avatar">A</div>
          <h1 class="name" id="name">Nombre</h1>
          <p class="location" id="location">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>Ciudad</span>
          </p>
          <p class="bio" id="bio"></p>
        </div>

        <!-- Body -->
        <div class="profile-body">
          <!-- Social Links -->
          <div class="social-grid" id="socialGrid"></div>

          <!-- Contact Buttons -->
          <div class="contact-buttons" id="contactButtons"></div>

          <!-- Projects -->
          <div class="section" id="projectsSection">
            <h3 class="section-title">Proyectos</h3>
            <div id="projectsList"></div>
          </div>

          <!-- QR -->
          <div class="section qr-section">
            <h3 class="section-title">Comparte este perfil</h3>
            <div class="qr-container">
              <div id="qrCode"></div>
            </div>
            <p class="qr-hint">Escanea para ver este perfil</p>
          </div>

          <!-- Branding -->
          <div class="branding">
            <a href="https://teokaye.mx">Teokaye x Founders</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/founders/js/founders-config.js"></script>
  <script src="/founders/js/founders-qr.js"></script>
  <script src="/founders/js/founders-vcard.js"></script>

  <script>
    let founder = null;
    let projects = [];

    const etapaLabels = {
      'idea': 'Idea',
      'construccion': 'Construyendo',
      'ingresos': 'Con ingresos',
      'escalando': 'Escalando'
    };

    // Social network icons (SVG)
    const socialIcons = {
      instagram: '<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>',
      facebook: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
      twitter: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
      tiktok: '<svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>',
      linkedin: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
      youtube: '<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>',
      website: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>'
    };

    // Init
    document.addEventListener('DOMContentLoaded', loadProfile);

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('s');
      const id = params.get('id');

      if (!slug && !id) {
        showError();
        return;
      }

      try {
        founder = slug
          ? await FoundersConfig.getFounderBySlug(slug)
          : await FoundersConfig.getFounderById(id);

        if (!founder) {
          showError();
          return;
        }

        projects = await FoundersConfig.getFounderProjects(founder.id);

        // Fallback to legacy project
        if (projects.length === 0 && founder.proyecto) {
          projects = [{
            nombre: founder.proyecto,
            descripcion: founder.descripcion_proyecto,
            etapa: founder.etapa,
            url: founder.website
          }];
        }

        render();
      } catch (err) {
        console.error('Error:', err);
        showError();
      }
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }

    function render() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('profile').style.display = 'block';

      document.title = `${founder.nombre} | Founders Teokaye`;

      // Avatar
      const avatarEl = document.getElementById('avatar');
      if (founder.foto_url) {
        avatarEl.innerHTML = `<img src="${founder.foto_url}" alt="${founder.nombre}">`;
      } else {
        avatarEl.textContent = founder.nombre.charAt(0).toUpperCase();
      }

      // Name & Location
      document.getElementById('name').textContent = founder.nombre;
      document.getElementById('location').querySelector('span').textContent = founder.ciudad || 'Mexico';

      // Bio
      const bioEl = document.getElementById('bio');
      if (founder.bio) {
        bioEl.textContent = founder.bio;
        bioEl.style.display = 'block';
      } else {
        bioEl.style.display = 'none';
      }

      renderSocialLinks();
      renderContactButtons();
      renderProjects();

      // QR
      FoundersQR.generateProfileQR('qrCode', founder, { size: 140 });
    }

    function renderSocialLinks() {
      const container = document.getElementById('socialGrid');

      // Si redes son privadas, mostrar botón para solicitar
      if (founder.redes_privadas) {
        const hasSocials = founder.instagram || founder.facebook || founder.twitter || founder.tiktok || founder.linkedin || founder.youtube || founder.website;
        if (hasSocials) {
          container.innerHTML = `
            <button class="btn btn-secondary" onclick="requestSocials()" style="grid-column: 1 / -1;">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Solicitar acceso a redes sociales
            </button>
          `;
        } else {
          container.style.display = 'none';
        }
        return;
      }

      const links = [];
      const socials = [
        { key: 'instagram', label: 'Instagram', prefix: 'https://instagram.com/' },
        { key: 'facebook', label: 'Facebook', prefix: 'https://facebook.com/' },
        { key: 'twitter', label: 'X', prefix: 'https://x.com/' },
        { key: 'tiktok', label: 'TikTok', prefix: 'https://tiktok.com/@' },
        { key: 'linkedin', label: 'LinkedIn', prefix: 'https://linkedin.com/in/' },
        { key: 'youtube', label: 'YouTube', prefix: 'https://youtube.com/' },
        { key: 'website', label: 'Web personal', prefix: '' }
      ];

      socials.forEach(s => {
        if (founder[s.key]) {
          let url = founder[s.key];
          if (!url.startsWith('http')) {
            url = s.prefix + url.replace('@', '');
          }
          links.push(`
            <a href="${url}" class="social-link ${s.key}" target="_blank" rel="noopener">
              ${socialIcons[s.key]}
              <span>${s.label}</span>
            </a>
          `);
        }
      });

      if (links.length > 0) {
        container.innerHTML = links.join('');
      } else {
        container.style.display = 'none';
      }
    }

    function renderContactButtons() {
      const container = document.getElementById('contactButtons');
      let html = '';

      // Si contacto es privado, solo mostrar botón de solicitar
      if (founder.contacto_privado) {
        html += `
          <button class="btn btn-primary" onclick="requestContact()">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Solicitar datos de contacto
          </button>
        `;
      } else {
        // Phone display
        if (founder.telefono) {
          html += `
            <div class="phone-display">
              <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              ${FoundersConfig.formatPhone(founder.telefono)}
            </div>
          `;

          // WhatsApp
          const waUrl = `https://wa.me/${FoundersConfig.formatPhoneWhatsApp(founder.telefono)}`;
          html += `
            <a href="${waUrl}" class="btn btn-whatsapp" target="_blank">
              <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Enviar WhatsApp
            </a>
          `;
        }

        // vCard
        html += `
          <button class="btn btn-primary" onclick="downloadContact()">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Agregar a contactos
          </button>
        `;
      }

      // Share (siempre visible)
      html += `
        <button class="btn btn-secondary" onclick="shareProfile()">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Compartir perfil
        </button>
      `;

      container.innerHTML = html;
    }

    function renderProjects() {
      const container = document.getElementById('projectsList');
      const section = document.getElementById('projectsSection');

      if (projects.length === 0) {
        section.style.display = 'none';
        return;
      }

      container.innerHTML = projects.map(p => `
        <div class="project-card">
          <div class="project-header">
            <span class="project-name">${p.nombre}</span>
            ${p.etapa ? `<span class="project-badge ${p.etapa}">${etapaLabels[p.etapa] || p.etapa}</span>` : ''}
          </div>
          ${p.descripcion ? `<p class="project-desc">${p.descripcion}</p>` : ''}
          ${p.url ? `
            <a href="${p.url.startsWith('http') ? p.url : 'https://' + p.url}" class="project-link" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              ${p.url.replace(/^https?:\/\//, '').replace(/\/$/, '')}
            </a>
          ` : ''}
        </div>
      `).join('');
    }

    function downloadContact() {
      // Si contacto es privado, no incluir teléfono en vCard
      const founderData = founder.contacto_privado
        ? { ...founder, telefono: null }
        : founder;
      FoundersVCard.download(founderData, projects);
      showToast('Contacto descargado');
    }

    async function shareProfile() {
      const url = window.location.href;
      const title = `${founder.nombre} | Founders Teokaye`;

      if (navigator.share) {
        try {
          await navigator.share({ title, url });
        } catch (e) {
          copyToClipboard(url);
        }
      } else {
        copyToClipboard(url);
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Link copiado');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    function requestContact() {
      // TODO: Implementar sistema de solicitudes en Supabase
      showToast('Proximamente podras solicitar acceso');
    }

    function requestSocials() {
      // TODO: Implementar sistema de solicitudes en Supabase
      showToast('Proximamente podras solicitar acceso');
    }
  </script>
