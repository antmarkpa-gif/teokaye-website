<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Perfil | Founders Teokaye</title>
  <meta name="description" content="Perfil de founder en la comunidad Teokaye">
  <link rel="icon" type="image/svg+xml" href="/simbolo.svg">
  <link rel="apple-touch-icon" href="/founders/icon-192.png">
  <meta name="theme-color" content="#461D14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/founders/css/founders-app.css">
  <style>
    /* Page-specific overrides */
    body{
      justify-content:center;
    }
  </style>
</head>
<body>
  <div class="profile-page" id="profilePage">
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <div class="error-message" id="errorMessage" style="display:none;">
      <h2>Perfil no encontrado</h2>
      <p>Este perfil no existe o no esta disponible.</p>
    </div>

    <div class="profile-card" id="profileCard" style="display:none;">
      <!-- Avatar -->
      <div class="profile-avatar" id="avatar">A</div>

      <!-- Name & City -->
      <h1 class="profile-name" id="name">Nombre</h1>
      <p class="profile-city" id="city">Ciudad</p>

      <!-- QR Code -->
      <div class="qr-container">
        <div id="qrCode"></div>
      </div>

      <!-- Phone (if public) -->
      <div class="profile-phone" id="phoneSection" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        <span id="phone">000 000 0000</span>
      </div>

      <!-- Actions -->
      <div class="profile-actions">
        <button class="btn-action btn-primary" id="btnContact" onclick="downloadContact()">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
          Agregar contacto
        </button>
        <button class="btn-action btn-secondary" onclick="shareProfile()">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
          Compartir perfil
        </button>
        <a class="btn-action btn-whatsapp" id="btnWhatsApp" href="#" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
          Enviar WhatsApp
        </a>
      </div>

      <!-- Projects -->
      <div id="projectsSection">
        <h3 class="section-title">Proyectos</h3>
        <div class="projects-list" id="projectsList"></div>
      </div>

      <!-- Branding -->
      <div class="profile-brand">
        <a href="https://teokaye.mx">Teokaye<span>x</span>Founders</a>
      </div>
    </div>
  </div>

  <!-- QR Code Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Founders Scripts -->
  <script src="/founders/js/founders-config.js"></script>
  <script src="/founders/js/founders-qr.js"></script>
  <script src="/founders/js/founders-vcard.js"></script>

  <script>
    let currentFounder = null;
    let currentProjects = [];

    // Etapa icons
    const etapaIcons = {
      'idea': '\u{1F4A1}',
      'construccion': '\u{1F6A7}',
      'ingresos': '\u{1F4B0}',
      'escalando': '\u{1F680}'
    };

    // Load profile on page load
    document.addEventListener('DOMContentLoaded', async function() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('s');
      const id = params.get('id');

      if (!slug && !id) {
        showError();
        return;
      }

      try {
        // Load founder
        if (slug) {
          currentFounder = await FoundersConfig.getFounderBySlug(slug);
        } else {
          currentFounder = await FoundersConfig.getFounderById(id);
        }

        if (!currentFounder) {
          showError();
          return;
        }

        // Load projects
        currentProjects = await FoundersConfig.getFounderProjects(currentFounder.id);

        // If no projects in new table, use legacy data
        if (currentProjects.length === 0 && currentFounder.proyecto) {
          currentProjects = [{
            nombre: currentFounder.proyecto,
            descripcion: currentFounder.descripcion_proyecto,
            etapa: currentFounder.etapa
          }];
        }

        // Render profile
        renderProfile();

      } catch (err) {
        console.error('Error loading profile:', err);
        showError();
      }
    });

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('errorMessage').style.display = 'block';
    }

    function renderProfile() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('profileCard').style.display = 'block';

      // Update page title
      document.title = `${currentFounder.nombre} | Founders Teokaye`;

      // Avatar
      const avatarEl = document.getElementById('avatar');
      if (currentFounder.foto_url) {
        avatarEl.innerHTML = `<img src="${currentFounder.foto_url}" alt="${currentFounder.nombre}">`;
      } else {
        avatarEl.textContent = currentFounder.nombre.charAt(0).toUpperCase();
      }

      // Name & City
      document.getElementById('name').textContent = currentFounder.nombre;
      document.getElementById('city').textContent = currentFounder.ciudad || 'Mexico';

      // QR Code
      FoundersQR.generateProfileQR('qrCode', currentFounder, { size: 180 });

      // Phone
      if (currentFounder.telefono_publico && currentFounder.telefono) {
        document.getElementById('phoneSection').style.display = 'flex';
        document.getElementById('phone').textContent = FoundersConfig.formatPhone(currentFounder.telefono);

        // WhatsApp button
        const waBtn = document.getElementById('btnWhatsApp');
        waBtn.style.display = 'flex';
        waBtn.href = `https://wa.me/52${currentFounder.telefono.replace(/\D/g, '')}`;
      }

      // Projects
      renderProjects();
    }

    function renderProjects() {
      const container = document.getElementById('projectsList');

      if (currentProjects.length === 0) {
        document.getElementById('projectsSection').style.display = 'none';
        return;
      }

      container.innerHTML = currentProjects.map(project => `
        <div class="project-card">
          <div class="project-header">
            <span class="project-name">${project.nombre}</span>
            <span class="project-icon">${etapaIcons[project.etapa] || '\u{1F4BC}'}</span>
          </div>
          ${project.descripcion ? `<p class="project-desc">${project.descripcion}</p>` : ''}
          ${project.etapa ? `<span class="badge ${project.etapa}">${FoundersConfig.getEtapaLabel(project.etapa)}</span>` : ''}
          ${project.url ? `<a class="project-url" href="${project.url}" target="_blank" rel="noopener">${project.url.replace(/^https?:\/\//, '')}</a>` : ''}
        </div>
      `).join('');
    }

    // Download vCard
    function downloadContact() {
      if (!currentFounder) return;
      FoundersVCard.download(currentFounder, currentProjects);
    }

    // Share profile
    async function shareProfile() {
      const url = window.location.href;
      const title = `${currentFounder.nombre} | Founders Teokaye`;
      const text = currentProjects.length > 0
        ? `Conoce a ${currentFounder.nombre} y su proyecto ${currentProjects[0].nombre}`
        : `Conoce a ${currentFounder.nombre} en la comunidad de Founders`;

      if (navigator.share) {
        try {
          await navigator.share({ title, text, url });
        } catch (err) {
          // User cancelled or error
          fallbackCopy(url);
        }
      } else {
        fallbackCopy(url);
      }
    }

    // Fallback copy to clipboard
    function fallbackCopy(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Link copiado al portapapeles');
      }).catch(() => {
        prompt('Copia este link:', text);
      });
    }
  </script>
</body>
</html>
