<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Teokaye</title>
  <meta name="description" content="Déjanos tus datos y cuéntanos cómo fue tu visita a Teokaye.">

  <!--
  SQL para crear la tabla en Supabase:

  CREATE TABLE IF NOT EXISTS registros (
    id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
    nombre text NOT NULL,
    telefono text NOT NULL,
    recibir_eventos boolean DEFAULT false,
    experiencia text,
    volveria text,
    recomendaria text,
    created_at timestamptz DEFAULT now()
  );
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@400;500;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" href="/favicon.ico">

  <style>
    :root {
      --bg: #E6E0D6;
      --text: #1E1B18;
      --text-light: #4A4540;
      --accent: #B8826B;
      --accent-dark: #461D14;
      --white: #FFFCF8;
      --green: #6B7A3E;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo {
      font-family: 'Cormorant Infant', serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
      display: block;
      margin-bottom: 32px;
    }
    .header-title {
      font-family: 'Cormorant Infant', serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 16px;
    }
    .header-subtitle {
      font-size: 16px;
      color: var(--text);
      line-height: 1.7;
    }

    /* Form elements */
    .form-group {
      margin-bottom: 28px;
    }
    .form-label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }
    .form-input,
    .form-textarea {
      width: 100%;
      padding: 12px 0;
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus,
    .form-textarea:focus {
      border-bottom-color: var(--accent-dark);
    }
    .form-input::placeholder,
    .form-textarea::placeholder {
      color: #A09A94;
    }
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      background: var(--white);
      cursor: pointer;
    }
    .checkbox-input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--accent-dark);
      cursor: pointer;
    }
    .checkbox-label {
      font-size: 15px;
      color: var(--text);
      line-height: 1.5;
      cursor: pointer;
    }

    /* Pills */
    .pills-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill-btn {
      padding: 12px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: var(--white);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .pill-btn:hover {
      border-color: var(--accent);
    }
    .pill-btn.selected {
      background: var(--text);
      color: var(--bg);
    }

    /* Conditional field */
    .conditional-field {
      display: none;
      margin-top: 16px;
    }
    .conditional-field.visible {
      display: block;
    }
    .conditional-field .form-label {
      margin-bottom: 8px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(184, 130, 107, 0.3);
      margin: 32px 0;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 18px 24px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      color: var(--bg);
      background: var(--text);
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.02em;
      margin-top: 16px;
    }
    .btn-submit:hover {
      background: var(--accent-dark);
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Success screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 48px 0;
    }
    .success-screen.active {
      display: block;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
    }
    .success-icon svg {
      width: 100%;
      height: 100%;
      color: var(--green);
    }
    .success-title {
      font-family: 'Cormorant Infant', serif;
      font-size: 32px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 12px;
    }
    .success-message {
      font-size: 16px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* Form container */
    .form-container {
      display: block;
    }
    .form-container.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <a href="https://teokaye.mx" class="logo">Teokaye</a>
      <h1 class="header-title">Gracias por visitarnos</h1>
      <p class="header-subtitle">Cuéntanos cómo te fue y mantente conectado con nosotros.</p>
    </div>

    <!-- Form -->
    <form class="form-container" id="registroForm" onsubmit="handleSubmit(event)">

      <!-- Datos de contacto -->
      <div class="form-group">
        <label class="form-label">¿Cómo te llamas?</label>
        <input type="text" class="form-input" id="nombre" placeholder="Tu nombre" required>
      </div>

      <div class="form-group">
        <label class="form-label">Tu número de WhatsApp</label>
        <input type="tel" class="form-input" id="telefono" placeholder="222 123 4567" required>
      </div>

      <!-- Recibir eventos -->
      <div class="form-group">
        <label class="form-label">¿Te gustaría recibir más información sobre los eventos?</label>
        <div class="pills-group" id="recibirEventosGroup">
          <button type="button" class="pill-btn" data-value="si" onclick="selectRecibirEventos('si')">Sí</button>
          <button type="button" class="pill-btn" data-value="no" onclick="selectRecibirEventos('no')">No</button>
        </div>
      </div>

      <!-- Volvería -->
      <div class="form-group">
        <label class="form-label">¿Volverías a Teokaye?</label>
        <div class="pills-group" id="volveriaGroup">
          <button type="button" class="pill-btn" data-value="si" onclick="selectVolveria('si')">Sí, seguro</button>
          <button type="button" class="pill-btn" data-value="tal_vez" onclick="selectVolveria('tal_vez')">Tal vez</button>
          <button type="button" class="pill-btn" data-value="no" onclick="selectVolveria('no')">No creo</button>
        </div>
        <!-- Pregunta condicional: qué te gustó (si dice sí) -->
        <div class="conditional-field" id="queTeGustoContainer">
          <label class="form-label">¿Qué te gustó?</label>
          <textarea class="form-textarea" id="queTeGusto" placeholder="Cuéntanos..." rows="2"></textarea>
        </div>
        <!-- Pregunta condicional: qué mejorar (si dice tal vez o no) -->
        <div class="conditional-field" id="queMejorarContainer">
          <label class="form-label">¿Qué podríamos mejorar?</label>
          <textarea class="form-textarea" id="queMejorar" placeholder="Tu opinión nos ayuda..." rows="2"></textarea>
        </div>
      </div>

      <!-- Recomendaría -->
      <div class="form-group">
        <label class="form-label">¿Nos recomendarías a alguien?</label>
        <div class="pills-group" id="recomendariaGroup">
          <button type="button" class="pill-btn" data-value="si" onclick="selectRecomendaria('si')">Sí</button>
          <button type="button" class="pill-btn" data-value="no" onclick="selectRecomendaria('no')">No</button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btnSubmit">Enviar</button>
    </form>

    <!-- Success Screen -->
    <div class="success-screen" id="successScreen">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>

      <h1 class="success-title">¡Gracias!</h1>
      <p class="success-message">Tu registro se ha enviado correctamente.<br>Nos vemos pronto.</p>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://ifewzsfbyobprzpbukmj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmZXd6c2ZieW9icHJ6cGJ1a21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzMwMDAsImV4cCI6MjA5MTYwOTAwMH0.d0A-clF08uC2UJ1nD-xZ5Sqvim7F4LYZIl0Y5KoRHYY';

    // ═══════════════════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════════════════
    let volveria = null;
    let recomendaria = null;
    let recibirEventos = null;

    // ═══════════════════════════════════════════════════════════════════════════
    // PILLS SELECTION
    // ═══════════════════════════════════════════════════════════════════════════
    function selectVolveria(value) {
      volveria = value;
      document.querySelectorAll('#volveriaGroup .pill-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === value);
      });

      // Mostrar pregunta condicional según respuesta
      const queTeGustoContainer = document.getElementById('queTeGustoContainer');
      const queMejorarContainer = document.getElementById('queMejorarContainer');

      if (value === 'si') {
        queTeGustoContainer.classList.add('visible');
        queMejorarContainer.classList.remove('visible');
        document.getElementById('queMejorar').value = '';
      } else if (value === 'tal_vez' || value === 'no') {
        queTeGustoContainer.classList.remove('visible');
        queMejorarContainer.classList.add('visible');
        document.getElementById('queTeGusto').value = '';
      }
    }

    function selectRecomendaria(value) {
      recomendaria = value;
      document.querySelectorAll('#recomendariaGroup .pill-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === value);
      });
    }

    function selectRecibirEventos(value) {
      recibirEventos = value;
      document.querySelectorAll('#recibirEventosGroup .pill-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === value);
      });
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // SUBMIT
    // ═══════════════════════════════════════════════════════════════════════════
    async function handleSubmit(e) {
      e.preventDefault();

      const nombre = document.getElementById('nombre').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const queTeGusto = document.getElementById('queTeGusto').value.trim();
      const queMejorar = document.getElementById('queMejorar').value.trim();
      // Combinar en un solo campo experiencia
      const experiencia = queTeGusto || queMejorar || null;

      if (!nombre || !telefono) {
        alert('Por favor ingresa tu nombre y número de teléfono.');
        return;
      }

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        await supabaseFetch('registros', {
          method: 'POST',
          body: JSON.stringify({
            nombre: nombre,
            telefono: telefono,
            recibir_eventos: recibirEventos === 'si',
            experiencia: experiencia || null,
            volveria: volveria,
            recomendaria: recomendaria
          })
        });

        showSuccess();

      } catch (error) {
        console.error('Error submitting registro:', error);
        alert('Hubo un error al enviar. Por favor intenta de nuevo.');
        btn.disabled = false;
        btn.textContent = 'Enviar';
      }
    }

    function showSuccess() {
      document.getElementById('registroForm').classList.add('hidden');
      document.getElementById('successScreen').classList.add('active');
      window.scrollTo(0, 0);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════════════════════
    async function supabaseFetch(endpoint, options = {}) {
      const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
      const headers = {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal',
        ...options.headers
      };
      const response = await fetch(url, { ...options, headers });
      if (!response.ok) {
        const error = await response.text();
        throw new Error(error || `Error ${response.status}`);
      }
      return null;
    }
  </script>
</body>
</html>
