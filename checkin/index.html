<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Check-in | Teokaye x FEMCA</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      min-height: 100dvh; /* Dynamic viewport height for mobile */
      padding: 0;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* Page wrapper */
    .page-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      padding: 48px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f4bf00, transparent);
    }

    .header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #f4bf00 0%, #ffde59 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 20px rgba(244, 191, 0, 0.3);
    }

    .header-subtitle {
      color: #999;
      font-size: 14px;
      margin-top: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Container */
    .container {
      flex: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    /* Form Card */
    .form-container {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* Form */
    .form-group {
      margin-bottom: 28px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .required {
      color: #f4bf00;
      margin-left: 2px;
    }

    .form-select,
    .form-input {
      width: 100%;
      padding: 16px 18px;
      font-size: 16px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafafa;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      transition: all 0.3s ease;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    .form-select {
      background-image: url("data:image/svg+xml,%3Csvg width='14' height='9' viewBox='0 0 14 9' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L7 7.5L13 1.5' stroke='%23f4bf00' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 18px center;
      padding-right: 50px;
      cursor: pointer;
    }

    .form-select:hover,
    .form-input:hover {
      border-color: #f4bf00;
      background: #ffffff;
    }

    .form-select:focus,
    .form-input:focus {
      outline: none;
      border-color: #f4bf00;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(244, 191, 0, 0.1);
    }

    .form-select option {
      color: #1a1a1a;
      padding: 12px;
    }

    .form-select option:first-child {
      color: #999;
    }

    /* Radio buttons */
    .radio-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .radio-option {
      position: relative;
    }

    .radio-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #666;
      background: #fafafa;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .radio-label:hover {
      border-color: #f4bf00;
      background: #fffbf0;
      transform: translateY(-2px);
    }

    .radio-option input[type="radio"]:checked + .radio-label {
      background: linear-gradient(135deg, #f4bf00 0%, #ffde59 100%);
      border-color: #f4bf00;
      color: #1a1a1a;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(244, 191, 0, 0.3);
      transform: translateY(-2px);
    }

    /* Conditional field */
    .conditional-field {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
      display: none;
      animation: slideDown 0.3s ease;
    }

    .conditional-field.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .helper-text {
      font-size: 13px;
      color: #999;
      margin-top: 8px;
      font-style: italic;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 20px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #1a1a1a;
      background: linear-gradient(135deg, #f4bf00 0%, #ffde59 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 36px;
      box-shadow: 0 8px 20px rgba(244, 191, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn-submit:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(244, 191, 0, 0.4);
    }

    .btn-submit:active {
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(26, 26, 26, 0.2);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .error-message {
      background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
      color: #991b1b;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
      display: none;
      border-left: 4px solid #dc2626;
    }

    .error-message.show {
      display: block;
      animation: slideDown 0.3s ease;
    }

    /* Success screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 80px 20px;
      animation: fadeIn 0.5s ease;
    }

    .success-screen.show {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .success-check {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #f4bf00 0%, #ffde59 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 10px 40px rgba(244, 191, 0, 0.4);
      animation: scaleIn 0.5s ease 0.2s backwards;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0);
        rotate: -180deg;
      }
      to {
        transform: scale(1);
        rotate: 0deg;
      }
    }

    .success-check svg {
      width: 56px;
      height: 56px;
      color: #1a1a1a;
      stroke-width: 4;
    }

    .success-title {
      font-size: 32px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 16px;
      animation: slideDown 0.5s ease 0.3s backwards;
    }

    .success-subtitle {
      font-size: 20px;
      color: #d4d4d4;
      margin-bottom: 12px;
      font-weight: 500;
      animation: slideDown 0.5s ease 0.4s backwards;
    }

    .success-brand {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #f4bf00 0%, #ffde59 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      animation: slideDown 0.5s ease 0.5s backwards;
    }

    .success-links {
      margin-top: 40px;
      animation: slideDown 0.5s ease 0.6s backwards;
    }

    .success-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 28px;
      background: rgba(244, 191, 0, 0.15);
      border: 2px solid rgba(244, 191, 0, 0.4);
      border-radius: 12px;
      color: #f4bf00;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .success-link:hover {
      background: rgba(244, 191, 0, 0.25);
      border-color: #f4bf00;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(244, 191, 0, 0.3);
    }

    .success-link svg {
      transition: transform 0.3s ease;
    }

    .success-link:hover svg {
      transform: translateX(4px);
    }

    /* Footer */
    .footer {
      background: #1a1a1a;
      color: #999;
      text-align: center;
      padding: 24px 20px;
      font-size: 13px;
      line-height: 1.6;
      border-top: 1px solid #333;
      margin-top: auto;
      flex-shrink: 0;
    }

    .footer-sponsor {
      color: #f4bf00;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Hide form when success */
    .form-container.hide {
      display: none;
    }

    /* Screen visibility */
    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .header h1 {
        font-size: 26px;
      }

      .form-container {
        padding: 28px 20px;
      }

      .form-label {
        font-size: 13px;
      }

      .radio-group {
        gap: 10px;
      }

      .radio-label {
        padding: 16px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

        const whatsappInput = document.getElementById('whatsapp');

        comunicacionRadios.forEach(radio => {
          radio.addEventListener('change', (e) => {
            if (e.target.value === 'true') {
              contactFields.classList.add('show');
              nombreInput.setAttribute('required', 'required');
              whatsappInput.setAttribute('required', 'required');
            } else {
              contactFields.classList.remove('show');
              nombreInput.removeAttribute('required');
              whatsappInput.removeAttribute('required');
              nombreInput.value = '';
              whatsappInput.value = '';
            }
          });
        });
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // PHONE SUBMISSION
      // ═══════════════════════════════════════════════════════════════════════════
      async function handlePhoneSubmit(e) {
        e.preventDefault();

        const btnPhoneSubmit = document.getElementById('btnPhoneSubmit');
        const errorMessage = document.getElementById('errorMessage');
        const phoneInput = document.getElementById('phoneNumber');

        // Hide error message
        errorMessage.classList.remove('show');

        // Validate phone number
        const phone = phoneInput.value.trim();
        if (!/^[0-9]{10}$/.test(phone)) {
          showError('Por favor ingresa un número de WhatsApp válido de 10 dígitos');
          return;
        }

        // Show loading state
        btnPhoneSubmit.disabled = true;
        btnPhoneSubmit.innerHTML = '<div class="spinner"></div>';

        try {
          userPhone = phone;

          // Check if phone exists in database
          const { data, error } = await supabase
            .from('checkins')
            .select('*')
            .eq('phone', phone)
            .order('created_at', { ascending: false })
            .limit(1);

          if (error) {
            throw error;
          }

          // Hide phone screen
          document.getElementById('phoneScreen').classList.remove('active');

          if (data && data.length > 0) {
            // Returning user
            previousUserData = data[0];
            showReturningUserScreen();
          } else {
            // New user
            showNewUserScreen();
          }

        } catch (error) {
          console.error('Error checking phone:', error);
          showError('Error al verificar el número. Por favor intenta de nuevo.');

          // Reset button
          btnPhoneSubmit.disabled = false;
          btnPhoneSubmit.innerHTML = 'Continuar';
        }
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // RETURNING USER FLOW
      // ═══════════════════════════════════════════════════════════════════════════
      function showReturningUserScreen() {
        const returningScreen = document.getElementById('returningScreen');
        const eventoSelect = document.getElementById('eventoReturning');

        // Auto-select event based on today's date
        autoSelectEvent(eventoSelect);

        returningScreen.classList.add('active');
      }

      async function handleReturningSubmit(e) {
        e.preventDefault();

        const btnReturningSubmit = document.getElementById('btnReturningSubmit');
        const errorMessage = document.getElementById('errorMessage');

        // Hide error message
        errorMessage.classList.remove('show');

        // Show loading state
        btnReturningSubmit.disabled = true;
        btnReturningSubmit.innerHTML = '<div class="spinner"></div>';

        try {
          const evento = document.getElementById('eventoReturning').value;

          if (!evento) {
            throw new Error('Por favor selecciona un concierto');
          }

          // Insert new record with phone + evento, copy other fields from previous record
          const { data, error } = await supabase
            .from('checkins')
            .insert([{
              phone: userPhone,
              evento,
              ciudad_origen: previousUserData.ciudad_origen,
              como_se_entero: previousUserData.como_se_entero,
              rango_edad: previousUserData.rango_edad,
              acepta_comunicacion: previousUserData.acepta_comunicacion,
              whatsapp: previousUserData.whatsapp,
              nombre: previousUserData.nombre,
              primera_vez: false // Returning user, so not first time
            }]);

          if (error) {
            throw error;
          }

          // Show success screen
          showSuccess();

        } catch (error) {
          console.error('Error submitting returning user form:', error);
          showError(error.message || 'Error al enviar el formulario. Por favor intenta de nuevo.');

          // Reset button
          btnReturningSubmit.disabled = false;
          btnReturningSubmit.innerHTML = 'Enviar check-in';
        }
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // NEW USER FLOW
      // ═══════════════════════════════════════════════════════════════════════════
      function showNewUserScreen() {
        const newUserScreen = document.getElementById('newUserScreen');
        const eventoSelect = document.getElementById('evento');

        // Auto-select event based on today's date
        autoSelectEvent(eventoSelect);

        newUserScreen.classList.add('active');
      }

      async function handleNewUserSubmit(e) {
        e.preventDefault();

        const btnSubmit = document.getElementById('btnSubmit');
        const errorMessage = document.getElementById('errorMessage');

        // Hide error message
        errorMessage.classList.remove('show');

        // Show loading state
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = '<div class="spinner"></div>';

        try {
          // Get form values
          const evento = document.getElementById('evento').value;
          const ciudadOrigen = document.getElementById('ciudad').value.trim();
          const comoSeEntero = document.getElementById('comoSeEntero').value;
          const primeraVez = document.querySelector('input[name="primeraVez"]:checked')?.value === 'true';
          const rangoEdad = document.getElementById('edad').value;
          const aceptaComunicacion = document.querySelector('input[name="comunicacion"]:checked')?.value === 'true';

          // Get contact info if they want to receive communications
          let nombre = null;
          let whatsapp = null;
          if (aceptaComunicacion) {
            nombre = document.getElementById('nombre').value.trim();
            whatsapp = document.getElementById('whatsapp').value.trim();
          }

          // Validate required fields
          if (!evento || !ciudadOrigen || !comoSeEntero || !rangoEdad) {
            throw new Error('Por favor completa todos los campos requeridos');
          }

          // Check if primera_vez radio is selected
          const primeraVezSelected = document.querySelector('input[name="primeraVez"]:checked');
          if (!primeraVezSelected) {
            throw new Error('Por favor indica si es tu primera vez en el festival');
          }

          // Check if comunicacion radio is selected
          const comunicacionSelected = document.querySelector('input[name="comunicacion"]:checked');
          if (!comunicacionSelected) {
            throw new Error('Por favor indica si quieres recibir información de próximas ediciones');
          }

          // Validate contact info if they want communications
          if (aceptaComunicacion) {
            if (!nombre || !whatsapp) {
              throw new Error('Por favor completa tu nombre y WhatsApp para recibir información');
            }
          }

          // Insert into Supabase with phone
          const { data, error } = await supabase
            .from('checkins')
            .insert([{
              phone: userPhone,
              evento,
              ciudad_origen: ciudadOrigen,
              como_se_entero: comoSeEntero,
              primera_vez: primeraVez,
              rango_edad: rangoEdad,
              acepta_comunicacion: aceptaComunicacion,
              nombre,
              whatsapp
            }]);

          if (error) {
            throw error;
          }

          // Show success screen
          showSuccess();

        } catch (error) {
          console.error('Error submitting form:', error);
          showError(error.message || 'Error al enviar el formulario. Por favor intenta de nuevo.');

          // Reset button
          btnSubmit.disabled = false;
          btnSubmit.innerHTML = 'Enviar check-in';
        }
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // UTILITIES
      // ═══════════════════════════════════════════════════════════════════════════
      function autoSelectEvent(selectElement) {
        // Get current date in Mexico City timezone
        const now = new Date();
        const mexicoCityTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/Mexico_City' }));

        const year = mexicoCityTime.getFullYear();
        const month = String(mexicoCityTime.getMonth() + 1).padStart(2, '0');
        const day = String(mexicoCityTime.getDate()).padStart(2, '0');
        const hour = mexicoCityTime.getHours();

        const dateKey = `${year}-${month}-${day}`;

        // Check if there's an event today
        let eventToSelect = null;

        // For May 1st, select based on time of day
        if (dateKey === '2026-05-01') {
          if (hour < 15) {
            // Before 3pm, select the 12:00 event
            eventToSelect = eventDates['2026-05-01-12'];
          } else {
            // After 3pm, select the 18:00 event
            eventToSelect = eventDates['2026-05-01-18'];
          }
        } else if (eventDates[dateKey]) {
          eventToSelect = eventDates[dateKey];
        }

        // Auto-select if event found
        if (eventToSelect && selectElement) {
          selectElement.value = eventToSelect;
        }
      }

      function showError(message) {
        const errorMessage = document.getElementById('errorMessage');
        errorMessage.textContent = message;
        errorMessage.classList.add('show');
        errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      function showSuccess() {
        document.getElementById('formContainer').classList.add('hide');
        document.getElementById('successScreen').classList.add('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

    })();
  </script>
</body>
</html>
