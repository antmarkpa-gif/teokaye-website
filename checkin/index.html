<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Check-in | Teokaye x FEMCA</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: #222222;
      color: #f4bf00;
      text-align: center;
      padding: 32px 20px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Container */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    /* Form */
    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #222222;
      margin-bottom: 8px;
    }

    .required {
      color: #f4bf00;
    }

    .form-select,
    .form-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      color: #222222;
      background: #ffffff;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    .form-select {
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23222222' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 16px center;
      padding-right: 44px;
    }

    .form-select:focus,
    .form-input:focus {
      outline: none;
      border-color: #f4bf00;
    }

    .form-select option {
      color: #222222;
    }

    .form-select option:first-child {
      color: #9ca3af;
    }

    /* Radio buttons */
    .radio-group {
      display: flex;
      gap: 16px;
    }

    .radio-option {
      flex: 1;
    }

    .radio-option input[type="radio"] {
      display: none;
    }

    .radio-label {
      display: block;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 500;
      color: #222222;
      background: #ffffff;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .radio-option input[type="radio"]:checked + .radio-label {
      background: #f4bf00;
      border-color: #f4bf00;
      color: #222222;
      font-weight: 600;
    }

    /* Conditional field */
    .conditional-field {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
      display: none;
    }

    .conditional-field.show {
      display: block;
    }

    .helper-text {
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      color: #222222;
      background: #f4bf00;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 32px;
    }

    .btn-submit:hover {
      background: #e0ad00;
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(34, 34, 34, 0.3);
      border-top-color: #222222;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .error-message {
      background: #fef2f2;
      color: #dc2626;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* Success screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .success-screen.show {
      display: block;
    }

    .success-check {
      width: 80px;
      height: 80px;
      background: #f4bf00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .success-check svg {
      width: 48px;
      height: 48px;
      color: #222222;
    }

    .success-title {
      font-size: 24px;
      font-weight: 700;
      color: #222222;
      margin-bottom: 12px;
    }

    .success-subtitle {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .success-brand {
      font-size: 16px;
      font-weight: 600;
      color: #f4bf00;
    }

    /* Footer */
    .footer {
      background: #222222;
      color: #ffffff;
      text-align: center;
      padding: 24px 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    .footer-sponsor {
      color: #f4bf00;
      font-weight: 600;
    }

    /* Hide form when success */
    .form-container.hide {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>Teokaye x FEMCA</h1>
  </div>

  <!-- Container -->
  <div class="container">
    <!-- Error message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Form -->
    <div class="form-container" id="formContainer">
      <form id="checkinForm">
        <!-- 1. Evento -->
        <div class="form-group">
          <label class="form-label">
            ¿A qué concierto vienes? <span class="required">*</span>
          </label>
          <select class="form-select" id="evento" required>
            <option value="" disabled selected>Selecciona un concierto</option>
            <option value="Jueves 30 abril, 18:00 — Ensamble de Percusiones FEMCA — Patio del Palacio Municipal">Jueves 30 abril, 18:00 — Ensamble de Percusiones FEMCA</option>
            <option value="Viernes 1 mayo, 12:00 — Toccato Ensamble — Centro Cultural LA SOL">Viernes 1 mayo, 12:00 — Toccato Ensamble</option>
            <option value="Viernes 1 mayo, 18:00 — Xica Ensamble — Casa de Cultura Acapetlahuacan">Viernes 1 mayo, 18:00 — Xica Ensamble</option>
            <option value="Sábado 2 mayo, 17:00 — Orquesta Femenil de Guitarras Sencuicati — Estaca SUD Atlixco">Sábado 2 mayo, 17:00 — Orquesta Femenil de Guitarras Sencuicati</option>
            <option value="Domingo 3 mayo, 13:00 — Orquesta de Guitarras de Xalapa — Patio Museo MAVA">Domingo 3 mayo, 13:00 — Orquesta de Guitarras de Xalapa</option>
          </select>
        </div>

        <!-- 2. Ciudad -->
        <div class="form-group">
          <label class="form-label">
            ¿De qué ciudad o colonia vienes? <span class="required">*</span>
          </label>
          <input type="text" class="form-input" id="ciudad" required placeholder="Ej: San Pedro Cholula">
        </div>

        <!-- 3. Cómo se enteró -->
        <div class="form-group">
          <label class="form-label">
            ¿Cómo te enteraste del festival? <span class="required">*</span>
          </label>
          <select class="form-select" id="comoSeEntero" required>
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="Anuncio en Instagram o Facebook">Anuncio en Instagram o Facebook</option>
            <option value="Me invitó alguien">Me invitó alguien</option>
            <option value="Redes sociales de FEMCA">Redes sociales de FEMCA</option>
            <option value="Periódico o radio">Periódico o radio</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

        <!-- 4. Primera vez -->
        <div class="form-group">
          <label class="form-label">
            ¿Es tu primera vez en el festival? <span class="required">*</span>
          </label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="primeraVezSi" name="primeraVez" value="true" required>
              <label class="radio-label" for="primeraVezSi">Sí</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="primeraVezNo" name="primeraVez" value="false" required>
              <label class="radio-label" for="primeraVezNo">No</label>
            </div>
          </div>
        </div>

        <!-- 5. Edad -->
        <div class="form-group">
          <label class="form-label">
            ¿Qué edad tienes? <span class="required">*</span>
          </label>
          <select class="form-select" id="edad" required>
            <option value="" disabled selected>Selecciona tu rango de edad</option>
            <option value="18-24">18-24</option>
            <option value="25-34">25-34</option>
            <option value="35-44">35-44</option>
            <option value="45+">45+</option>
          </select>
        </div>

        <!-- 6. Comunicación -->
        <div class="form-group">
          <label class="form-label">
            ¿Quieres recibir info de próximas ediciones?
          </label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="comunicacionSi" name="comunicacion" value="true">
              <label class="radio-label" for="comunicacionSi">Sí</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="comunicacionNo" name="comunicacion" value="false">
              <label class="radio-label" for="comunicacionNo">No</label>
            </div>
          </div>

          <!-- Conditional WhatsApp field -->
          <div class="conditional-field" id="whatsappField">
            <label class="form-label">WhatsApp (opcional)</label>
            <input type="tel" class="form-input" id="whatsapp" placeholder="Ej: 2221234567">
            <div class="helper-text">10 dígitos, sin espacios ni guiones</div>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-submit" id="btnSubmit">
          Enviar check-in
        </button>
      </form>
    </div>

    <!-- Success screen -->
    <div class="success-screen" id="successScreen">
      <div class="success-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-title">¡Gracias por venir!</div>
      <div class="success-subtitle">Disfruta el festival</div>
      <div class="success-brand">Teokaye x FEMCA 2026</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Patrocinado por <span class="footer-sponsor">Teokaye</span>, foro cultural de San Pedro Cholula
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // SUPABASE CONFIG
    // ═══════════════════════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://ifewzsfbyobprzpbukmj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmZXd6c2ZieW9icHJ6cGJ1a21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzMwMDAsImV4cCI6MjA5MTYwOTAwMH0.d0A-clF08uC2UJ1nD-xZ5Sqvim7F4LYZIl0Y5KoRHYY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ═══════════════════════════════════════════════════════════════════════════
    // EVENT DATES MAPPING (Mexico City timezone)
    // ═══════════════════════════════════════════════════════════════════════════
    const eventDates = {
      '2026-04-30': 'Jueves 30 abril, 18:00 — Ensamble de Percusiones FEMCA — Patio del Palacio Municipal',
      '2026-05-01-12': 'Viernes 1 mayo, 12:00 — Toccato Ensamble — Centro Cultural LA SOL',
      '2026-05-01-18': 'Viernes 1 mayo, 18:00 — Xica Ensamble — Casa de Cultura Acapetlahuacan',
      '2026-05-02': 'Sábado 2 mayo, 17:00 — Orquesta Femenil de Guitarras Sencuicati — Estaca SUD Atlixco',
      '2026-05-03': 'Domingo 3 mayo, 13:00 — Orquesta de Guitarras de Xalapa — Patio Museo MAVA'
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      autoSelectEvent();
      setupEventListeners();
    });

    function autoSelectEvent() {
      // Get current date in Mexico City timezone
      const now = new Date();
      const mexicoCityTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/Mexico_City' }));

      const year = mexicoCityTime.getFullYear();
      const month = String(mexicoCityTime.getMonth() + 1).padStart(2, '0');
      const day = String(mexicoCityTime.getDate()).padStart(2, '0');
      const hour = mexicoCityTime.getHours();

      const dateKey = `${year}-${month}-${day}`;

      // Check if there's an event today
      let eventToSelect = null;

      // For May 1st, select based on time of day
      if (dateKey === '2026-05-01') {
        if (hour < 15) {
          // Before 3pm, select the 12:00 event
          eventToSelect = eventDates['2026-05-01-12'];
        } else {
          // After 3pm, select the 18:00 event
          eventToSelect = eventDates['2026-05-01-18'];
        }
      } else if (eventDates[dateKey]) {
        eventToSelect = eventDates[dateKey];
      }

      // Auto-select if event found
      if (eventToSelect) {
        const selectElement = document.getElementById('evento');
        selectElement.value = eventToSelect;
      }
    }

    function setupEventListeners() {
      // Show/hide WhatsApp field based on communication preference
      const comunicacionRadios = document.querySelectorAll('input[name="comunicacion"]');
      const whatsappField = document.getElementById('whatsappField');

      comunicacionRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
          if (e.target.value === 'true') {
            whatsappField.classList.add('show');
          } else {
            whatsappField.classList.remove('show');
            document.getElementById('whatsapp').value = '';
          }
        });
      });

      // Form submission
      document.getElementById('checkinForm').addEventListener('submit', handleSubmit);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // FORM SUBMISSION
    // ═══════════════════════════════════════════════════════════════════════════
    async function handleSubmit(e) {
      e.preventDefault();

      const btnSubmit = document.getElementById('btnSubmit');
      const errorMessage = document.getElementById('errorMessage');

      // Hide error message
      errorMessage.classList.remove('show');

      // Show loading state
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '<div class="spinner"></div>';

      try {
        // Get form values
        const evento = document.getElementById('evento').value;
        const ciudadOrigen = document.getElementById('ciudad').value.trim();
        const comoSeEntero = document.getElementById('comoSeEntero').value;
        const primeraVez = document.querySelector('input[name="primeraVez"]:checked')?.value === 'true';
        const rangoEdad = document.getElementById('edad').value;
        const aceptaComunicacion = document.querySelector('input[name="comunicacion"]:checked')?.value === 'true';
        const whatsapp = aceptaComunicacion ? document.getElementById('whatsapp').value.trim() || null : null;

        // Validate required fields
        if (!evento || !ciudadOrigen || !comoSeEntero || !rangoEdad) {
          throw new Error('Por favor completa todos los campos requeridos');
        }

        // Check if primera_vez radio is selected
        const primeraVezSelected = document.querySelector('input[name="primeraVez"]:checked');
        if (!primeraVezSelected) {
          throw new Error('Por favor indica si es tu primera vez en el festival');
        }

        // Check if comunicacion radio is selected
        const comunicacionSelected = document.querySelector('input[name="comunicacion"]:checked');
        if (!comunicacionSelected) {
          throw new Error('Por favor indica si quieres recibir información de próximas ediciones');
        }

        // Insert into Supabase
        const { data, error } = await supabase
          .from('checkins')
          .insert([{
            evento,
            ciudad_origen: ciudadOrigen,
            como_se_entero: comoSeEntero,
            primera_vez: primeraVez,
            rango_edad: rangoEdad,
            acepta_comunicacion: aceptaComunicacion,
            whatsapp
          }]);

        if (error) {
          throw error;
        }

        // Show success screen
        document.getElementById('formContainer').classList.add('hide');
        document.getElementById('successScreen').classList.add('show');

        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });

      } catch (error) {
        console.error('Error submitting form:', error);

        // Show error message
        errorMessage.textContent = error.message || 'Error al enviar el formulario. Por favor intenta de nuevo.';
        errorMessage.classList.add('show');

        // Reset button
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = 'Enviar check-in';

        // Scroll to error
        errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  </script>
</body>
</html>
