<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago no completado — Teokaye</title>
<meta name="description" content="Tu pago no se completo. Si necesitas ayuda, escribenos por WhatsApp.">
<link rel="icon" type="image/png" href="../favicon.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#461D14;--terra:#B8826B;--sand:#E6E0D6;
  --bg:#F5F1EB;--carbon:#1E1B18;
  --muted:rgba(30,27,24,0.55);--border:rgba(70,29,20,0.12);
  --green:#25D366;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--carbon);
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.container{
  max-width:480px;
  text-align:center;
}

.icon{
  width:80px;
  height:80px;
  margin:0 auto 28px;
  background:var(--sand);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid var(--border);
}
.icon svg{
  width:36px;
  height:36px;
  fill:var(--terra);
}

h1{
  font-family:'DM Serif Display',serif;
  font-size:clamp(28px,7vw,36px);
  color:var(--deep);
  line-height:1.15;
  margin-bottom:16px;
}

.message{
  font-size:17px;
  color:var(--muted);
  margin-bottom:36px;
  max-width:380px;
  margin-left:auto;
  margin-right:auto;
}

.btn-wa{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:var(--green);
  color:white;
  border:none;
  border-radius:8px;
  padding:16px 32px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  text-decoration:none;
  transition:all .2s ease;
  box-shadow:0 4px 20px rgba(37,211,102,0.3);
}
.btn-wa:hover{
  background:#1FB85B;
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(37,211,102,0.35);
}
.btn-wa svg{
  width:20px;
  height:20px;
  fill:currentColor;
}
</style>
</head>
<body>

<div class="container">
  <div class="icon">
    <svg viewBox="0 0 24 24">
